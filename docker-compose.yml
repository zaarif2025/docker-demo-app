services:

  web:
    build: .
    container_name: nginx-web
    ports:
      - "8080:80"
    restart: always
    depends_on:
      - redis
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: redis-server
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
